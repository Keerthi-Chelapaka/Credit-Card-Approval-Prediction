<!DOCTYPE html>
<html>
<head>
    <title>Credit Card Approval Prediction</title>

    <style>
        body{
            background:#f4f4f4;
            font-family:Arial;
        }

        .container{
            width:50%;
            margin:auto;
            margin-top:30px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h2{
            text-align:center;
        }

        input,select{
            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:#28a745;
            color:white;
            border:none;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Credit Card Approval Prediction</h2>

<form action="/predict" method="POST">

<label>Gender</label>
<select name="gender">
<option value="1">Male</option>
<option value="0">Female</option>
</select>

<label>Own Car</label>
<select name="car">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>Own House</label>
<select name="realty">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>Number of Children</label>
<input type="number" name="children" required>

<label>Annual Income</label>
<input type="number" name="income" required>

<label>Income Type</label>
<select name="income_type">
<option value="0">Working</option>
<option value="1">Commercial Associate</option>
<option value="2">Pensioner</option>
<option value="3">State Servant</option>
</select>

<label>Education Type</label>
<select name="education">
<option value="0">Secondary</option>
<option value="1">Higher Education</option>
<option value="2">Incomplete Higher</option>
<option value="3">Lower Secondary</option>
<option value="4">Academic Degree</option>
</select>

<label>Family Status</label>
<select name="family_status">
<option value="0">Single</option>
<option value="1">Married</option>
<option value="2">Separated</option>
<option value="3">Widow</option>
<option value="4">Civil Marriage</option>
</select>

<label>Housing Type</label>
<select name="housing">
<option value="0">House / Apartment</option>
<option value="1">With Parents</option>
<option value="2">Municipal Apartment</option>
<option value="3">Rented Apartment</option>
<option value="4">Office Apartment</option>
<option value="5">Co-op Apartment</option>
</select>

<label>Days Employed</label>
<input type="number" name="days_employed" required>

<label>Work Phone</label>
<select name="work_phone">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>Phone</label>
<select name="phone">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>Email</label>
<select name="email">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>Family Members</label>
<input type="number" step="0.1" name="family_members" required>

<label>Family Dependency</label>
<input type="number" step="0.1" name="dependency" required>

<label>Age (Years)</label>
<input type="number" step="0.1" name="age" required>

<label>Years Employed</label>
<input type="number" step="0.1" name="years_employed" required>

<label>Months Balance</label>
<input type="number" name="months_balance" required>

<button type="submit">
Predict
</button>

</form>

</div>

</body>
</html>
